<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <title>Bachata Radio by DJ Doodlez</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
  <link rel="icon" href="./favicon.ico" type="image/x-icon">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #1f1f1f, #2c2c2c);
      color: white;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 20px 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .station-logo {
      width: 50px;
      height: 50px;
      object-fit: contain;
      border-radius: 8px;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
    }

    h1 {
      margin: 0;
      font-size: 2em;
      line-height: 1.2;
    }

    @keyframes pulse {
      0% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.6;
        transform: scale(1.02);
      }

      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .player-wrapper {
      margin: 0;
    }

    .songs-title {
      margin: 20px 0 10px;
      font-weight: 500;
      color: #ddd;
    }

    .my_lastsongs {
      max-width: 500px;
      width: 100%;
    }

    .my_songdivs {
      margin-bottom: 7px;
    }

    .my_lastsongs a {
      color: #ffb347 !important;
      text-decoration: none;
    }

    .my_lastsongs a:hover {
      text-decoration: underline;
    }


    .my_lastsonghtml {
      display: none;
    }

    .my_lastsonghtml>div {
      display: flex;
      gap: 8px;
      align-items: center;
      text-align: left;
      margin: 3px;
    }

    footer {
      margin-top: 20px;
      font-size: 0.75em;
      color: #888;
      opacity: 0.7;
    }

    a {
      color: white !important;
      text-decoration: none;
    }

    @media (max-width: 480px) {
      body {
        padding: 15px 10px;
      }

      .header {
        gap: 10px;
      }

      .station-logo {
        width: 40px;
        height: 40px;
      }

      h1 {
        font-size: 1.6em;
      }
    }
  </style>
</head>

<body>
  <div class="header">
    <img src="/img/logo.webp" alt="Bachata Radio" class="station-logo">
    <h1>Bachata Radio</h1>
  </div>

  <div class="player-wrapper">
    <div id="my_player" class="my_player" data-player="energy" data-skin="blue" data-width="260" data-autoplay="1" data-volume="70" data-streamurl="https://myradio24.org/bachatahit">
    </div>
  </div>

  <h2 class="songs-title">Последние песни</h2>

  <!-- Блок для отображения последних песен (обязательная структура из документации) -->
  <div class="my_lastsongs" data-revert="1">
    <div class="my_lastsonghtml">
      <div>
        <span>%songtime%</span>
        <a href="https://www.youtube.com/results?search_query=%songencode%" target="_blank" title="YouTube">%song%</a>
        <span class='vm_postLikes vm_likes vm_like_318761878_%songid%' data-likeid='318761878_%songid%'></span>
      </div>
    </div>
  </div>

  <footer>© 2026 Bachata Radio by DJ Doodlez</footer>


  <script src="https://myradio24.com/player/player.js?v3.31" data-radio="bachatahit" data-interval="15" data-vmid="0" data-lang="ru">
  </script>

  <script>
    (function() {

      const defaultTitle = "Bachata Radio by DJ Doodlez";

      function playerStarted() {
        if (!window.MY) return false;
        if (!MY.players) return false;
        if (!MY.players["my_player"]) return false;
        return MY.players["my_player"].started === 1;
      }

      function getSong(info) {

        if (!info || !info.songs || !info.songs.length) return "";

        const last = info.songs[info.songs.length - 1];

        if (Array.isArray(last)) return last[1] || "";
        if (last.song) return last.song;

        return "";
      }

      function parseSongInfo(fullTitle) {

        const parts = fullTitle.split(' - ');

        if (parts.length >= 2) {
          return {
            artist: parts[0],
            title: parts.slice(1).join(' - ')
          };
        }

        return {
          artist: '',
          title: fullTitle
        };
      }

      function updateMediaSession(fullTitle) {

        if (!('mediaSession' in navigator)) return;

        const { artist, title } = parseSongInfo(fullTitle);

        navigator.mediaSession.metadata = new MediaMetadata({
          title: title || "Bachata Radio",
          artist: artist || "Bachata Radio",
          album: "Bachata Radio",
          artwork: [
            {
              src: "/img/cover.webp",
              sizes: "512x512",
              type: "image/webp"
            }
          ]
        });

        navigator.mediaSession.playbackState = playerStarted() ? "playing" : "paused";

        try {

          navigator.mediaSession.setActionHandler("play", function() {
            $.player_play("play");
          });

          navigator.mediaSession.setActionHandler("pause", function() {
            $.player_play("stop");
          });

          navigator.mediaSession.setActionHandler("previoustrack", null);
          navigator.mediaSession.setActionHandler("nexttrack", null);
          navigator.mediaSession.setActionHandler("seekbackward", null);
          navigator.mediaSession.setActionHandler("seekforward", null);

        } catch (e) {
          console.log("MediaSession handlers not supported", e);
        }
      }

      function updateTitle(info) {

        if (!playerStarted()) {
          document.title = defaultTitle;

          if ('mediaSession' in navigator) {
            navigator.mediaSession.playbackState = "paused";
          }

          return;
        }

        const song = getSong(info);
        if (!song) return;

        document.title = song;

        updateMediaSession(song);
      }

      function hookPlayer() {

        if (!window.MY) return;

        const original = MY.player_updateinfo;

        if (!original) return;

        MY.player_updateinfo = function(info) {

          updateTitle(info);

          return original.apply(this, arguments);
        };
      }

      function monitorStop() {

        setInterval(function() {

          if (!playerStarted()) {

            if (document.title !== defaultTitle) {
              document.title = defaultTitle;
            }

            if ('mediaSession' in navigator) {
              navigator.mediaSession.playbackState = "paused";
            }

          }

        }, 1000);
      }

      document.addEventListener("DOMContentLoaded", function() {

        document.title = defaultTitle;

        const wait = setInterval(function() {

          if (window.MY && MY.player_updateinfo) {
            clearInterval(wait);
            hookPlayer();
            monitorStop();
          }

        }, 200);

      });

    })();
  </script>
</body>

</html>
