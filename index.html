<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <title>Bachata Radio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
  <link rel="icon" href="./favicon.ico" type="image/x-icon">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #1f1f1f, #2c2c2c);
      color: white;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 20px 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .station-logo {
      width: 50px;
      height: 50px;
      object-fit: contain;
      border-radius: 8px;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
    }

    h1 {
      margin: 0;
      font-size: 2em;
      line-height: 1.2;
    }

    @keyframes pulse {
      0% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.6;
        transform: scale(1.02);
      }

      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .player-wrapper {
      margin: 0;
    }

    .songs-title {
      margin: 20px 0 10px;
      font-weight: 500;
      color: #ddd;
    }

    .my_lastsongs {
      max-width: 500px;
      width: 100%;
    }

    .my_songdivs {
      margin-bottom: 7px;
    }

    .my_lastsongs a {
      color: #ffb347 !important;
      text-decoration: none;
    }

    .my_lastsongs a:hover {
      text-decoration: underline;
    }


    .my_lastsonghtml {
      display: none;
    }

    .my_lastsonghtml>div {
      display: flex;
      gap: 8px;
      align-items: center;
      text-align: left;
      margin: 3px;
    }

    footer {
      margin-top: 20px;
      font-size: 0.75em;
      color: #888;
      opacity: 0.7;
    }

    a {
      color: white !important;
      text-decoration: none;
    }

    @media (max-width: 480px) {
      body {
        padding: 15px 10px;
      }

      .header {
        gap: 10px;
      }

      .station-logo {
        width: 40px;
        height: 40px;
      }

      h1 {
        font-size: 1.6em;
      }
    }
  </style>
</head>

<body>
  <div class="header">
    <img src="/img/logo.webp" alt="Bachata Radio" class="station-logo">
    <h1>Bachata Radio</h1>
  </div>

  <div class="player-wrapper">
    <div id="my_player" class="my_player" data-player="energy" data-skin="blue" data-width="260" data-autoplay="1" data-volume="70" data-streamurl="https://myradio24.org/bachatahit">
    </div>
  </div>

  <h2 class="songs-title">Последние песни</h2>

  <!-- Блок для отображения последних песен (обязательная структура из документации) -->
  <div class="my_lastsongs" data-revert="1">
    <div class="my_lastsonghtml">
      <div>
        <span>%songtime%</span>
        <a href="https://www.youtube.com/results?search_query=%songencode%" target="_blank" title="YouTube">%song%</a>
        <span class='vm_postLikes vm_likes vm_like_318761878_%songid%' data-likeid='318761878_%songid%'></span>
      </div>
    </div>
  </div>

  <footer>© 2026 Bachata Radio by DJ Doodlez</footer>


  <script src="https://myradio24.com/player/player.js?v3.31" data-radio="bachatahit" data-interval="15" data-vmid="0" data-lang="ru">
  </script>

  <script>
    (function() {
      // Функция для обновления заголовка
      function updateTitleFromInfo(info) {
        if (info && info.songs && info.songs.length > 0) {
          const lastIndex = info.songs.length - 1;
          let currentSong = info.songs[lastIndex];
          let songTitle = '';

          if (Array.isArray(currentSong) && currentSong[1]) {
            songTitle = currentSong[1];
          } else if (currentSong && currentSong.song) {
            songTitle = currentSong.song;
          }

          if (songTitle) {
            document.title = `${songTitle}`;
          }
        }
      }

      // Функция для обновления Media Session API с логотипом
      function updateMediaSession(info) {
        if (info && info.songs && info.songs.length > 0) {
          const lastIndex = info.songs.length - 1;
          let currentSong = info.songs[lastIndex];

          let title = '';
          let artist = '';

          // Парсим данные трека (пытаемся разделить "Исполнитель - Название")
          if (Array.isArray(currentSong)) {
            const fullTitle = currentSong[1] || '';
            const parts = fullTitle.split(' - ');
            if (parts.length >= 2) {
              artist = parts[0];
              title = parts.slice(1).join(' - ');
            } else {
              title = fullTitle;
              artist = '';
            }
          } else if (currentSong && currentSong.song) {
            const fullTitle = currentSong.song || '';
            const parts = fullTitle.split(' - ');
            if (parts.length >= 2) {
              artist = parts[0];
              title = parts.slice(1).join(' - ');
            } else {
              title = fullTitle;
              artist = '';
            }
          }

          // Устанавливаем метаданные через Media Session API с логотипом радио
          if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
              title: title || 'Bachata Radio',
              artist: artist || 'Bachata Radio',
              album: 'Bachata Radio',
              artwork: [
                {
                  src: '/img/logo.webp', // путь к твоему логотипу
                  sizes: '512x512',
                  type: 'image/webp'
                }
              ]
            });

            navigator.mediaSession.playbackState = 'playing';
          }
        }
      }

      // Подключаем функции к колбэкам
      window.my_updateinfo_callback = function(info) {
        updateTitleFromInfo(info);
        updateMediaSession(info);
      };

      if (window.MY && typeof window.MY.player_updateinfo === 'function') {
        const originalFunc = window.MY.player_updateinfo;
        window.MY.player_updateinfo = function(info) {
          updateTitleFromInfo(info);
          updateMediaSession(info);
          originalFunc(info);
        };
      }

    })();
  </script>
</body>

</html>
