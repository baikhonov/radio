<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <title>Bachata Radio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
  <link rel="icon" href="./favicon.ico" type="image/x-icon">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #1f1f1f, #2c2c2c);
      color: white;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 20px 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 2em;
      /* animation: pulse 2s infinite ease-in-out; */
    }

    @keyframes pulse {
      0% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.6;
        transform: scale(1.02);
      }

      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .player-wrapper {
      margin: 10px 0;
    }

    .songs-title {
      margin: 20px 0 10px;
      font-weight: 500;
      color: #ddd;
    }

    /* Контейнер для последних песен */
    .my_lastsongs {
      max-width: 500px;
      width: 100%;
    }

    .my_songdivs {
      margin-bottom: 7px;
    }

    .my_lastsongs a {
      color: #ffb347 !important;
      text-decoration: none;
    }

    .my_lastsongs a:hover {
      text-decoration: underline;
    }

    /* Скрытый шаблон для одного трека (требуется документацией) */
    .my_lastsonghtml {
      display: none;
    }

    /* Стили для шаблонного элемента (на всякий случай, если он временно покажется) */
    .my_lastsonghtml>div {
      display: flex;
      gap: 8px;
      align-items: center;
      text-align: left;
      margin: 3px;
    }

    footer {
      margin-top: 30px;
      font-size: 0.75em;
      color: #888;
      opacity: 0.7;
    }

    a {
      color: white !important;
      text-decoration: none;
    }

    @media (max-width: 480px) {
      body {
        padding: 15px 10px;
      }

      h1 {
        font-size: 1.6em;
      }
    }
  </style>
</head>

<body>
  <h1>🎧 Bachata Radio</h1>

  <div class="player-wrapper">
    <div id="my_player" class="my_player" data-player="energy" data-skin="blue" data-width="260" data-autoplay="1" data-volume="70" data-streamurl="https://myradio24.org/bachatahit">
    </div>
  </div>

  <h2 class="songs-title">Последние песни</h2>

  <!-- Блок для отображения последних песен (обязательная структура из документации) -->
  <div class="my_lastsongs" data-revert="1">
    <div class="my_lastsonghtml">
      <div>
        <span>%songtime%</span>
        <a href="https://www.youtube.com/results?search_query=%songencode%" target="_blank" title="YouTube">%song%</a>
        <span class='vm_postLikes vm_likes vm_like_318761878_%songid%' data-likeid='318761878_%songid%'></span>
      </div>
    </div>
  </div>

  <footer>© 2026 Bachata Radio</footer>

  <script src="https://myradio24.com/player/player.js?v3.31" data-radio="bachatahit" data-interval="15" data-vmid="0" data-lang="ru">
  </script>
</body>

</html>
